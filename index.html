                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        ${prog.steps.map((step, idx) => `
                            <div class="bg-slate-50 border border-slate-100 p-4 rounded-2xl">
                                <div class="text-[9px] font-black text-slate-400 uppercase mb-2 tracking-widest flex items-center gap-1.5">
                                    <div class="w-1.5 h-1.5 rounded-full ${idx === 2 ? 'bg-amber-500' : 'bg-red-500'}"></div>
                                    ${step.role}
                                </div>
                                <p class="text-[11px] text-slate-700 font-bold leading-normal">${step.action}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                        <div class="flex items-start gap-3">
                            <div class="bg-emerald-100 p-2 rounded-lg text-emerald-600">
                                <i data-lucide="mic" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">音频/话筒配置</h4>
                                <p class="text-xs font-mono font-bold text-slate-700">${prog.tech}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-3">
                            <div class="bg-blue-100 p-2 rounded-lg text-blue-600">
                                <i data-lucide="move" class="w-4 h-4"></i>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">道具/物料</h4>
                                <p class="text-xs font-mono font-bold text-slate-700">${prog.props}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-4">
                        <button class="flex items-center gap-2 text-[10px] font-black text-red-600 bg-red-50 px-4 py-2 rounded-full hover:bg-red-100 transition-colors">
                            <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> 标记此环节就绪
                        </button>
                        <div class="flex items-center gap-1">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <span class="text-[9px] font-black text-slate-400 uppercase">实时连线中</span>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function selectProgram(id) {
            activeId = id;
            const term = searchInput.value.toLowerCase();
            const filtered = galaFlow.filter(p => p.name.toLowerCase().includes(term) || p.id.includes(term));
            renderSidebar(filtered);
            renderDetail(id);
        }

        // 搜索功能
        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = galaFlow.filter(p => p.name.toLowerCase().includes(term) || p.id.includes(term));
            renderSidebar(filtered);
        };

        // 初始化
        window.onload = () => {
            renderSidebar(galaFlow);
            renderDetail(activeId);
        };
    </script>
</body>
</html>
